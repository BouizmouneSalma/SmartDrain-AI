name: SmartDrain-AI CI/CD

on:
  # Declenchement sur push vers main
  push:
    branches: [main]
  # Declenchement sur pull request vers main
  pull_request:
    branches: [main]

# Evite d'empiler plusieurs runs concurrents sur la meme branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions minimales recommandees
permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  code-quality:
    name: Code Quality (Black + Frontend Build Check)
    runs-on: ubuntu-latest

    steps:
      # Recupere le code du repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure Python 3.11 pour les checks backend/IA
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt

      # Installe Black et dependencies minimales
      - name: Install Python quality tools
        run: |
          python -m pip install --upgrade pip
          pip install black

      # Verifie le formatage Python sur backend + ml
      - name: Black check (backend + ml)
        run: |
          black --check backend ml

      # Configure Node pour verifier que le frontend build correctement
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Installe les dependances frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Validation frontend (equivalent quality gate si pas de script lint)
      - name: Frontend build check
        working-directory: frontend
        run: npm run build

  tests:
    name: Tests (Backend + IA optionnel)
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      # Recupere le code du repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure Python 3.11 pour pytest
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt

      # Installe dependances backend + pytest
      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      # Execute les tests backend si presents
      - name: Run backend tests
        run: |
          if [ -d "backend/tests" ] && [ "$(find backend/tests -name 'test_*.py' | wc -l)" -gt 0 ]; then
            pytest backend/tests -q
          else
            echo "No backend tests found in backend/tests."
          fi

      # Execute les tests IA si presents (optionnel)
      - name: Run AI tests (optional)
        run: |
          if [ -d "ml/tests" ] && [ "$(find ml/tests -name 'test_*.py' | wc -l)" -gt 0 ]; then
            pytest ml/tests -q
          else
            echo "No AI tests found in ml/tests."
          fi

  build:
    name: Build Docker (and Push on main)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      # Recupere le code du repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Active Buildx pour des builds Docker modernes
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login Docker Hub uniquement sur push main (pas sur PR)
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Metadata/tags image backend
      - name: Extract backend image metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/smartdrain-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Build backend; push uniquement sur push main
      - name: Build and (optionally) push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      # Build frontend seulement si nginx.conf existe (sinon skip pour eviter echec)
      - name: Check frontend Docker prerequisites
        id: frontend_check
        run: |
          if [ -f "frontend/Dockerfile" ] && [ -f "frontend/nginx.conf" ]; then
            echo "can_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend Docker build: missing frontend/nginx.conf or Dockerfile."
          fi

      # Metadata/tags image frontend
      - name: Extract frontend image metadata
        if: steps.frontend_check.outputs.can_build == 'true'
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/smartdrain-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Build frontend; push uniquement sur push main
      - name: Build and (optionally) push frontend image
        if: steps.frontend_check.outputs.can_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  deploy:
    name: Deploy (Optional)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Placeholder de deploiement: adapter selon ton infra (VM, K8s, Render, etc.)
      - name: Deployment placeholder
        run: |
          echo "Deploy step is optional and currently a placeholder."
          echo "Add your deployment commands here (SSH, kubectl, docker compose pull/up, etc.)."
