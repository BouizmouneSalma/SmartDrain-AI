version: '3.8'

services:
  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartdrain_frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - smartdrain_network
    depends_on:
      - backend

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartdrain_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://smartdrain_user:smartdrain_pass@postgres:5432/smartdrain
      - LOG_LEVEL=info
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - smartdrain_network
    volumes:
      - ./ml:/app/ml:ro  # Montage du dossier ml (lecture seule)

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smartdrain_db
    environment:
      - POSTGRES_USER=smartdrain_user
      - POSTGRES_PASSWORD=smartdrain_pass
      - POSTGRES_DB=smartdrain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - smartdrain_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdrain_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Collecte de metriques
  prometheus:
    image: prom/prometheus:latest
    container_name: smartdrain_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - smartdrain_network
    depends_on:
      - backend

  # Grafana - Visualisation des metriques
  grafana:
    image: grafana/grafana:latest
    container_name: smartdrain_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    restart: unless-stopped
    networks:
      - smartdrain_network
    depends_on:
      - prometheus

networks:
  smartdrain_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
