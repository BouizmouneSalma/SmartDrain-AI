# Grafana Dashboards Provisioning
# Configure les dashboards à charger automatiquement

apiVersion: 1

providers:
  - name: 'SmartDrain Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
